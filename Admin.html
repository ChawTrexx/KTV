<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-TV Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;}
.box{max-width:600px;margin:auto;background:#111;padding:20px;border-radius:12px;margin-top:20px;}
input,textarea,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;background:#1a1a1a;border:1px solid #333;color:#fff;}
button{padding:10px;border-radius:8px;border:0;background:#6c5cff;color:#fff;width:100%;}
#list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:20px;}
.card{background:#1b1b1b;padding:10px;border-radius:10px;text-align:center;}
.card img{width:100%;height:120px;object-fit:cover;border-radius:6px;}
.del{background:red;margin-top:6px;}
</style>
</head>

<body>

<h2 style="text-align:center;">🔥 K-TV Admin Panel</h2>

<!-- 🔹 Series Upload -->
<div class="box">
<h3>Add Series</h3>

<input type="file" id="imageUpload">
<p id="result"></p>

<input id="thumb" placeholder="Thumbnail URL">
<img id="preview" style="width:100%;display:none;">

<input id="title" placeholder="Title">
<input id="genre" placeholder="Genre">
<input id="rating" placeholder="Rating">
<input id="quality" placeholder="Quality">

<button onclick="addSeries()">UPLOAD SERIES</button>
</div>

<!-- 🔹 Episode Upload -->
<div class="box">
<h3>Add Episode</h3>

<select id="seriesSelect"></select>
<input id="epTitle" placeholder="Episode Title">
<textarea id="video" placeholder="Video URL / iframe"></textarea>

<button onclick="addEpisode()">UPLOAD EPISODE</button>
</div>

<!-- 🔹 List -->
<div id="list"></div>

<script>
const URL = "https://sijqvbwghwcrzfvvlbey.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpanF2YndnaHdjcnpmdnZsYmV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTM3NDcsImV4cCI6MjA5MTY2OTc0N30.yC2q8K03r9lWV9ru_oSwgnYdewB1BvZiHQWZ1pVHkUg";

// ===== ImgBB Upload =====
imageUpload.onchange = async ()=>{
    const file = imageUpload.files[0];
    if(!file) return;

    result.innerText="Uploading...";

    const reader = new FileReader();
    reader.readAsDataURL(file);

    reader.onload = async ()=>{
        let base64 = reader.result.split(",")[1];

        let res = await fetch(`https://api.imgbb.com/1/upload?key=28303bb2f8b9d2907349e5567b265f2d`,{
            method:"POST",
            body:new URLSearchParams({image:base64})
        });

        let data = await res.json();

        if(data.success){
            thumb.value=data.data.url;
            preview.src=data.data.url;
            preview.style.display="block";
            result.innerText="✔ Done";
        }
    };
};

// preview manual
thumb.oninput=()=>{preview.src=thumb.value;preview.style.display="block";};

// ==== detectType (same) ====
function extractIframeSrc(i){let m=i.match(/src="([^"]+)"/);return m?m[1]:null;}
function makeSafeIframe(u){return `<iframe src="${u}" width="100%" height="400" allowfullscreen></iframe>`;}
function convertDropboxURL(u){try{let x=new URL(u);x.searchParams.set("raw","1");return x.toString();}catch{return u;}}
function detectType(i){
    i=i.trim();
    if(i.startsWith("<iframe")){
        let s=extractIframeSrc(i);
        if(s) return {type:"iframe",url:makeSafeIframe(s)};
    }
    if(i.includes("dropbox.com")) return {type:"video",url:convertDropboxURL(i)};
    return {type:"video",url:i};
}

// ===== Load Series =====
async function loadSeries(){
    let res = await fetch(`${URL}/rest/v1/series?select=*&order=id.desc`,{
        headers:{apikey:KEY,Authorization:"Bearer "+KEY}
    });

    let data = await res.json();

    seriesSelect.innerHTML="";
    list.innerHTML="";

    data.forEach(s=>{
        seriesSelect.innerHTML+=`<option value="${s.id}">${s.title}</option>`;

        list.innerHTML+=`
        <div class="card">
            <img src="${s.thumbnail}">
            <b>${s.title}</b><br>
            <small>EP: ${s.total_episodes}</small><br>
            <button class="del" onclick="del(${s.id})">Delete</button>
        </div>`;
    });
}

// ===== Add Series =====
async function addSeries(){
    await fetch(`${URL}/rest/v1/series`,{
        method:"POST",
        headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},
        body:JSON.stringify({
            title:title.value,
            thumbnail:thumb.value,
            genre:genre.value,
            rating:rating.value,
            quality:quality.value
        })
    });

    alert("Series Added");
    loadSeries();
}

// ===== Add Episode =====
async function addEpisode(){
    let sid = seriesSelect.value;
    let {url,type}=detectType(video.value);

    let res = await fetch(`${URL}/rest/v1/episodes?series_id=eq.${sid}&select=episode_number&order=episode_number.desc&limit=1`,{
        headers:{apikey:KEY,Authorization:"Bearer "+KEY}
    });

    let data = await res.json();
    let next = data.length ? data[0].episode_number+1 : 1;

    await fetch(`${URL}/rest/v1/episodes`,{
        method:"POST",
        headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},
        body:JSON.stringify({
            series_id:sid,
            episode_number:next,
            title:epTitle.value,
            video_url:url
        })
    });

    await fetch(`${URL}/rest/v1/series?id=eq.${sid}`,{
        method:"PATCH",
        headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},
        body:JSON.stringify({total_episodes:next})
    });

    alert("Episode Added");
    loadSeries();
}

// ===== Delete =====
window.del = async id=>{
    if(confirm("Delete series?")){
        await fetch(`${URL}/rest/v1/series?id=eq.${id}`,{
            method:"DELETE",
            headers:{apikey:KEY,Authorization:"Bearer "+KEY}
        });
        loadSeries();
    }
};

loadSeries();
</script>

</body>
</html>
